name: Android APK Build

permissions:
  actions: write
  contents: write

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure Git LFS objects are present
        run: |
          git lfs install --local
          git lfs pull

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform and build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1" "ndk;26.1.10909125"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build all Debug APK flavors (local parity)
        run: |
          ./gradlew \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            --no-daemon \
            --console=plain \
            --stacktrace \
            --info \
            assembleHypseusDebug \
            assembleSpaceaceDebug \
            assembleDleDebug \
            assembleDl2eDebug \
            assembleDlclassicDebug

      - name: Verify APK outputs
        run: |
          test -f app/build/outputs/apk/hypseus/debug/app-hypseus-debug.apk
          test -f app/build/outputs/apk/spaceace/debug/app-spaceace-debug.apk
          test -f app/build/outputs/apk/dle/debug/app-dle-debug.apk
          test -f app/build/outputs/apk/dl2e/debug/app-dl2e-debug.apk
          test -f app/build/outputs/apk/dlclassic/debug/app-dlclassic-debug.apk

      - name: Upload APK artifact (hypseus)
        uses: actions/upload-artifact@v4
        with:
          name: app-hypseus-debug-apk
          path: android-app/app/build/outputs/apk/hypseus/debug/*.apk
          if-no-files-found: error

      - name: Upload APK artifact (spaceace)
        uses: actions/upload-artifact@v4
        with:
          name: app-spaceace-debug-apk
          path: android-app/app/build/outputs/apk/spaceace/debug/*.apk
          if-no-files-found: error

      - name: Upload APK artifact (dle)
        uses: actions/upload-artifact@v4
        with:
          name: app-dle-debug-apk
          path: android-app/app/build/outputs/apk/dle/debug/*.apk
          if-no-files-found: error

      - name: Upload APK artifact (dl2e)
        uses: actions/upload-artifact@v4
        with:
          name: app-dl2e-debug-apk
          path: android-app/app/build/outputs/apk/dl2e/debug/*.apk
          if-no-files-found: error

      - name: Upload APK artifact (dlclassic)
        uses: actions/upload-artifact@v4
        with:
          name: app-dlclassic-debug-apk
          path: android-app/app/build/outputs/apk/dlclassic/debug/*.apk
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Download built APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: app-*-debug-apk
          merge-multiple: true

      - name: Prepare versioned APK names
        id: prep
        run: |
          VERSION="v0.1.${GITHUB_RUN_NUMBER}"
          mkdir -p packaged
          for apk in release-artifacts/*.apk; do
            base="$(basename "$apk" .apk)"
            cp "$apk" "packaged/${base}-${VERSION}.apk"
          done
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.version }}
          name: Android Game Builds ${{ steps.prep.outputs.version }}
          generate_release_notes: true
          files: packaged/*.apk

  cleanup-artifacts:
    needs: release
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Delete older APK artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const allArtifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const apkArtifacts = allArtifacts
              .filter((artifact) => /^app-.*-debug-apk$/.test(artifact.name))
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at));

            const artifactsToDelete = apkArtifacts.slice(5);
            core.info(`Keeping ${Math.min(apkArtifacts.length, 5)} APK artifacts, deleting ${artifactsToDelete.length}.`);

            for (const artifact of artifactsToDelete) {
              core.info(`Deleting artifact ${artifact.name} (${artifact.id}) created ${artifact.created_at}`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
