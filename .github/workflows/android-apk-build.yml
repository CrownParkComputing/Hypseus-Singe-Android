name: Android APK Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: Hypseus
            output_dir: hypseus
          - flavor: Spaceace
            output_dir: spaceace

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform and build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1" "ndk;26.1.10909125"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.flavor }} Debug APK
        run: ./gradlew assemble${{ matrix.flavor }}Debug

      - name: Upload APK artifact (${{ matrix.flavor }})
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.flavor }}-debug-apk
          path: android-app/app/build/outputs/apk/${{ matrix.output_dir }}/debug/*.apk
          if-no-files-found: error
